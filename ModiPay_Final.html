<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirana Billing</title>
  <script src="https://unpkg.com/@zxing/browser@latest"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #video { width: 100%; max-height: 400px; background: #000; }
    .item-list { max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body class="h-full bg-gray-50 font-sans">

<div class="max-w-2xl mx-auto bg-white min-h-screen shadow-xl">

  <!-- Header -->
  <div class="bg-blue-600 text-white p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">🛒 My Kirana</h1>
    <div class="text-right">
      <p class="text-sm">Bill No: <span id="billNo">BILL-001</span></p>
      <p class="text-sm">Total: <span id="grandTotal" class="font-bold">₹0.00</span></p>
    </div>
  </div>

  <!-- Scanner -->
  <div class="p-4 bg-gray-900">
    <video id="video" autoplay muted playsinline></video>
    <div id="scanResult" class="text-center text-green-400 font-bold mt-2"></div>
  </div>

  <!-- Items List -->
  <div class="p-4">
    <h2 class="font-semibold mb-3">Scanned Items</h2>
    <div id="itemsList" class="item-list space-y-2"></div>
  </div>

  <!-- Total -->
  <div class="fixed bottom-0 left-0 right-0 max-w-2xl mx-auto bg-white border-t p-4 shadow-2xl">
    <div class="flex justify-between items-center mb-4">
      <span class="text-xl font-bold">Total</span>
      <span id="totalDisplay" class="text-3xl font-bold text-blue-600">₹0</span>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <button onclick="showPaymentModal()" 
              class="bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl text-lg font-semibold">
        💰 Pay Now
      </button>
      <button onclick="clearBill()" 
              class="bg-gray-200 hover:bg-gray-300 py-4 rounded-xl text-lg font-semibold">
        New Bill
      </button>
    </div>
  </div>

</div>

<!-- Payment Modal -->
<div id="paymentModal" class="hidden fixed inset-0 bg-black/70 flex items-end">
  <div class="bg-white w-full rounded-t-3xl p-6">
    <h3 class="text-2xl font-bold mb-6">Select Payment</h3>
    
    <button onclick="cashPayment()" 
            class="w-full py-6 mb-4 bg-green-500 hover:bg-green-600 text-white rounded-2xl text-xl font-semibold flex items-center justify-center gap-3">
      💵 Cash Payment
    </button>

    <button onclick="upiPayment()" 
            class="w-full py-6 bg-purple-600 hover:bg-purple-700 text-white rounded-2xl text-xl font-semibold flex items-center justify-center gap-3">
      📱 UPI Payment (Razorpay)
    </button>

    <button onclick="closeModal()" 
            class="w-full mt-6 text-gray-500 py-3">Cancel</button>
  </div>
</div>

<!-- Success Modal -->
<div id="successModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="bg-white rounded-3xl p-8 text-center max-w-xs">
    <div id="successIcon" class="text-6xl mb-4">✅</div>
    <h3 id="successTitle" class="text-2xl font-bold mb-2">Payment Successful</h3>
    <p id="successMsg" class="text-gray-600 mb-6"></p>
    <button onclick="closeSuccessModal()" 
            class="bg-blue-600 text-white px-10 py-4 rounded-2xl w-full text-lg">OK - New Bill</button>
  </div>
</div>

<script>
// =============== PRODUCT DATABASE ===============
const productDB = {
  "8901030123456": { name: "Parle-G Biscuit", price: 10 },
  "8901234567890": { name: "Amul Milk 500ml", price: 28 },
  "8901764321098": { name: "Maggi Noodles", price: 12 },
  "8902100123456": { name: "Surf Excel 1kg", price: 85 },
  // Add more barcodes here
};

// =============== STATE ===============
let currentBill = [];
let codeReader;

// =============== SCANNER ===============
async function startScanner() {
  codeReader = new ZXingBrowser.BrowserMultiFormatReader();
  
  try {
    const videoInputDevices = await codeReader.listVideoInputDevices();
    const selectedDevice = videoInputDevices[videoInputDevices.length - 1]; // back camera preference
    
    await codeReader.decodeFromVideoDevice(
      selectedDevice.deviceId,
      'video',
      (result, err) => {
        if (result) {
          handleBarcode(result.getText());
        }
      }
    );
  } catch (err) {
    console.error(err);
    document.getElementById('scanResult').innerHTML = 
      '<span class="text-red-500">Camera permission needed</span>';
  }
}

// Handle scanned barcode
function handleBarcode(code) {
  const product = productDB[code] || { 
    name: `Item (${code.slice(-6)})`, 
    price: 50 
  };

  currentBill.push({
    barcode: code,
    name: product.name,
    price: product.price,
    qty: 1
  });

  renderBill();
  document.getElementById('scanResult').textContent = `✅ \( {product.name} - ₹ \){product.price}`;
  
  setTimeout(() => {
    document.getElementById('scanResult').textContent = '';
  }, 1500);
}

function renderBill() {
  const container = document.getElementById('itemsList');
  container.innerHTML = '';

  currentBill.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = "flex justify-between items-center bg-gray-50 p-3 rounded-xl";
    div.innerHTML = `
      <div>
        <p class="font-medium">${item.name}</p>
        <p class="text-sm text-gray-500">${item.barcode}</p>
      </div>
      <div class="text-right">
        <p class="font-bold">₹${item.price}</p>
        <button onclick="removeItem(${index})" class="text-red-500 text-xs">Remove</button>
      </div>
    `;
    container.appendChild(div);
  });

  const total = currentBill.reduce((sum, item) => sum + item.price, 0);
  document.getElementById('totalDisplay').textContent = `₹${total}`;
  document.getElementById('grandTotal').textContent = `₹${total}`;
}

// Remove item
function removeItem(index) {
  currentBill.splice(index, 1);
  renderBill();
}

// =============== PAYMENT ===============
function showPaymentModal() {
  const total = currentBill.reduce((sum, item) => sum + item.price, 0);
  if (total === 0) {
    alert("No items in bill!");
    return;
  }
  document.getElementById('paymentModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('paymentModal').classList.add('hidden');
}

function cashPayment() {
  closeModal();
  showSuccess("Cash Payment Received", "Thank you!");
}

async function upiPayment() {
  closeModal();
  const total = currentBill.reduce((sum, item) => sum + item.price, 0);

  const options = {
    key: "rzp_live_SlFpkLaE2aao9D", // Your live key
    amount: total * 100,
    currency: "INR",
    name: "My Kirana Store",
    description: "Bill Payment",
    handler: function (response) {
      showSuccess("UPI Payment Successful", "Payment ID: " + response.razorpay_payment_id);
    },
    modal: {
      ondismiss: function() {
        console.log('Checkout closed');
      }
    },
    theme: { color: "#2563eb" }
  };

  const rzp = new Razorpay(options);
  rzp.open();
}

function showSuccess(title, msg) {
  document.getElementById('successTitle').textContent = title;
  document.getElementById('successMsg').textContent = msg;
  document.getElementById('successModal').classList.remove('hidden');
}

function closeSuccessModal() {
  document.getElementById('successModal').classList.add('hidden');
  clearBill();
}

// Clear bill for next customer
function clearBill() {
  currentBill = [];
  renderBill();
  document.getElementById('billNo').textContent = `BILL-${Math.floor(1000 + Math.random() * 9000)}`;
}

// =============== START APP ===============
window.onload = () => {
  startScanner();
  clearBill();
};
</script>
</body>
</html>
