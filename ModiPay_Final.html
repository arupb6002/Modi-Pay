<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirana Billing</title>
  <script src="https://unpkg.com/@zxing/browser@latest"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --saffron: #F97316;
      --saffron-light: #FED7AA;
      --saffron-dark: #C2410C;
      --green: #16A34A;
      --green-light: #DCFCE7;
      --cream: #FFFBEB;
      --brown: #78350F;
      --card: #FFFFFF;
      --bg: #FFF7ED;
      --text: #1C1917;
      --muted: #78716C;
      --border: #FDE8C8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    h1, h2, h3, .brand {
      font-family: 'Baloo 2', cursive;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #EA580C 0%, #F97316 50%, #FB923C 100%);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(249,115,22,0.35);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-left { display: flex; flex-direction: column; gap: 2px; }
    .store-name { font-size: 1.5rem; font-weight: 800; color: white; letter-spacing: -0.5px; }
    .store-tag { font-size: 0.7rem; color: rgba(255,255,255,0.8); font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
    .header-right { text-align: right; }
    .bill-no { font-size: 0.72rem; color: rgba(255,255,255,0.75); font-weight: 500; }
    .header-total { font-size: 1.4rem; font-weight: 800; color: white; font-family: 'Baloo 2', cursive; }

    /* ── SCANNER AREA ── */
    .scanner-wrap {
      background: #111827;
      position: relative;
      overflow: hidden;
    }

    #video {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      display: block;
    }

    .scanner-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      width: 200px;
      height: 120px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 8px;
    }

    .scan-frame::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 3px;
      background: #F97316;
      border-radius: 8px 8px 0 0;
      animation: scan-line 1.8s ease-in-out infinite;
    }

    .corner {
      position: absolute;
      width: 18px; height: 18px;
      border-color: #F97316;
      border-style: solid;
    }
    .corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    @keyframes scan-line {
      0%, 100% { top: -1px; opacity: 1; }
      50% { top: calc(100% - 2px); opacity: 0.7; }
    }

    .scan-label {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    /* ── SCAN TOAST ── */
    .scan-toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #1C1917;
      color: white;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      border-left: 4px solid #F97316;
    }

    .scan-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── CAMERA PERMISSION BANNER ── */
    .cam-error {
      display: none;
      background: #FEF3C7;
      border: 1px solid #FCD34D;
      border-radius: 12px;
      margin: 12px 16px 0;
      padding: 12px 16px;
      font-size: 0.82rem;
      color: #92400E;
      gap: 10px;
      align-items: center;
    }
    .cam-error.show { display: flex; }
    .cam-error-icon { font-size: 1.3rem; flex-shrink: 0; }
    .retry-btn {
      margin-left: auto;
      background: #F97316;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: 'Noto Sans', sans-serif;
    }

    /* ── MANUAL INPUT ── */
    .manual-wrap {
      margin: 12px 16px 0;
      display: flex;
      gap: 8px;
    }

    .manual-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-family: 'Noto Sans', sans-serif;
      background: white;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .manual-input:focus { border-color: var(--saffron); }
    .manual-input::placeholder { color: #A8A29E; }

    .manual-btn {
      background: var(--saffron);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: 'Baloo 2', cursive;
      transition: background 0.2s;
    }
    .manual-btn:hover { background: var(--saffron-dark); }

    /* ── ITEMS SECTION ── */
    .items-section {
      padding: 16px 16px 200px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--brown);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .item-count-badge {
      background: var(--saffron);
      color: white;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 9px;
      font-family: 'Baloo 2', cursive;
    }

    /* ── ITEM CARD ── */
    .item-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(249,115,22,0.06);
      animation: slide-in 0.25s ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-icon {
      width: 40px; height: 40px;
      background: var(--saffron-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-barcode { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }

    .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .item-price {
      font-size: 1rem;
      font-weight: 800;
      color: var(--saffron-dark);
      font-family: 'Baloo 2', cursive;
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      overflow: hidden;
    }

    .qty-btn {
      width: 28px; height: 26px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      color: var(--saffron-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .qty-btn:hover { background: var(--saffron-light); }

    .qty-val {
      min-width: 26px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
    .empty-text { font-size: 0.9rem; font-weight: 500; }
    .empty-sub { font-size: 0.78rem; margin-top: 4px; opacity: 0.7; }

    /* ── FOOTER BAR ── */
    .footer-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-top: 2px solid var(--border);
      padding: 14px 16px 20px;
      box-shadow: 0 -8px 32px rgba(249,115,22,0.12);
      z-index: 40;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .total-label { font-size: 0.85rem; color: var(--muted); font-weight: 500; }
    .total-amount {
      font-size: 2rem;
      font-weight: 800;
      color: var(--saffron-dark);
      font-family: 'Baloo 2', cursive;
      line-height: 1;
    }

    .bill-summary {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .action-btns { display: grid; grid-template-columns: 1fr auto; gap: 10px; }

    .pay-btn {
      background: linear-gradient(135deg, #EA580C, #F97316);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Baloo 2', cursive;
      box-shadow: 0 6px 20px rgba(234,88,12,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .pay-btn:active { transform: scale(0.97); box-shadow: 0 3px 10px rgba(234,88,12,0.3); }

    .new-btn {
      background: #F5F5F4;
      color: var(--muted);
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Baloo 2', cursive;
      transition: background 0.2s;
    }
    .new-btn:hover { background: var(--border); }

    /* ── MODALS ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-backdrop.center { align-items: center; }
    .modal-backdrop.hidden { display: none; }

    .modal-sheet {
      background: white;
      width: 100%;
      max-width: 520px;
      border-radius: 28px 28px 0 0;
      padding: 28px 24px 36px;
      animation: sheet-up 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes sheet-up {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-card {
      background: white;
      border-radius: 24px;
      padding: 32px 28px;
      width: 90%;
      max-width: 340px;
      text-align: center;
      animation: pop-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes pop-in {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .modal-handle {
      width: 40px; height: 4px;
      background: #E7E5E4;
      border-radius: 100px;
      margin: 0 auto 24px;
    }

    .modal-title {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--text);
    }

    .pay-option {
      width: 100%;
      border: 2px solid var(--border);
      background: white;
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Baloo 2', cursive;
    }

    .pay-option:hover { border-color: var(--saffron); background: var(--bg); transform: translateY(-1px); }
    .pay-option:active { transform: translateY(0); }

    .pay-option-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .pay-option.cash .pay-option-icon { background: var(--green-light); }
    .pay-option.upi  .pay-option-icon { background: #EDE9FE; }

    .pay-option-text { text-align: left; }
    .pay-option-name { font-size: 1rem; font-weight: 700; color: var(--text); }
    .pay-option-sub  { font-size: 0.75rem; color: var(--muted); font-family: 'Noto Sans', sans-serif; }

    .pay-option-arrow { margin-left: auto; color: #D6D3D1; font-size: 1.1rem; }

    .cancel-link {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 18px;
      cursor: pointer;
      padding: 8px;
    }

    /* Success modal */
    .success-icon-wrap {
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto 20px;
    }

    .success-icon-wrap.ok  { background: var(--green-light); }
    .success-icon-wrap.err { background: #FEE2E2; }

    .success-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .success-msg   { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }

    .ok-btn {
      width: 100%;
      background: linear-gradient(135deg, #16A34A, #22C55E);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Baloo 2', cursive;
      box-shadow: 0 6px 16px rgba(22,163,74,0.35);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="store-name">🛒 My Kirana</span>
    <span class="store-tag">Quick Billing</span>
  </div>
  <div class="header-right">
    <div class="bill-no">Bill #<span id="billNo">0001</span></div>
    <div class="header-total">₹<span id="grandTotal">0</span></div>
  </div>
</div>

<!-- Scanner -->
<div class="scanner-wrap">
  <video id="video" autoplay muted playsinline></video>
  <div class="scanner-overlay">
    <div class="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
    <div class="scan-label">📷 Barcode ke saamne rakho</div>
  </div>
</div>

<!-- Camera Error Banner -->
<div id="camError" class="cam-error">
  <span class="cam-error-icon">⚠️</span>
  <span>Camera access nahi mili. Browser settings mein permission allow karo.</span>
  <button class="retry-btn" onclick="retryCamera()">Retry</button>
</div>

<!-- Manual Barcode Input -->
<div class="manual-wrap">
  <input type="number" id="manualCode" class="manual-input"
         placeholder="Barcode number type karo..." 
         onkeydown="if(event.key==='Enter') addManual()" />
  <button class="manual-btn" onclick="addManual()">+ Add</button>
</div>

<!-- Items List -->
<div class="items-section">
  <div class="section-header">
    <div class="section-title">
      🧾 Scanned Items
      <span class="item-count-badge" id="itemCount">0</span>
    </div>
  </div>
  <div id="itemsList"></div>
</div>

<!-- Scan Toast -->
<div id="scanToast" class="scan-toast"></div>

<!-- Footer Bar -->
<div class="footer-bar">
  <div class="total-row">
    <div>
      <div class="total-label">Kul Amount</div>
      <div class="bill-summary" id="billSummary">0 items · ₹0.00</div>
    </div>
    <div class="total-amount">₹<span id="totalDisplay">0</span></div>
  </div>
  <div class="action-btns">
    <button class="pay-btn" onclick="showPaymentModal()">💰 Pay Now</button>
    <button class="new-btn" onclick="clearBill()">🔄 New</button>
  </div>
</div>

<!-- Payment Modal -->
<div id="paymentModal" class="modal-backdrop hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Payment Method</div>

    <button class="pay-option cash" onclick="cashPayment()">
      <div class="pay-option-icon">💵</div>
      <div class="pay-option-text">
        <div class="pay-option-name">Cash Payment</div>
        <div class="pay-option-sub">Haath mein paise lo</div>
      </div>
      <span class="pay-option-arrow">›</span>
    </button>

    <button class="pay-option upi" onclick="upiPayment()">
      <div class="pay-option-icon">📱</div>
      <div class="pay-option-text">
        <div class="pay-option-name">UPI / Razorpay</div>
        <div class="pay-option-sub">PhonePe, GPay, Paytm...</div>
      </div>
      <span class="pay-option-arrow">›</span>
    </button>

    <div class="cancel-link" onclick="closeModal()">Cancel</div>
  </div>
</div>

<!-- Success Modal -->
<div id="successModal" class="modal-backdrop center hidden">
  <div class="modal-card">
    <div id="successIconWrap" class="success-icon-wrap ok">
      <span id="successIcon">✅</span>
    </div>
    <div id="successTitle" class="success-title">Payment Ho Gaya!</div>
    <div id="successMsg" class="success-msg"></div>
    <button class="ok-btn" onclick="closeSuccessModal()">✓ OK — Naya Bill</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// PRODUCT DATABASE
// ═══════════════════════════════════════
const productDB = {
  "8901030123456": { name: "Parle-G Biscuit",   price: 10,  icon: "🍪" },
  "8901234567890": { name: "Amul Milk 500ml",    price: 28,  icon: "🥛" },
  "8901764321098": { name: "Maggi Noodles",      price: 12,  icon: "🍜" },
  "8902100123456": { name: "Surf Excel 1kg",     price: 85,  icon: "🧴" },
  "8901030654321": { name: "Lays Classic 26g",   price: 20,  icon: "🥔" },
  "8901491100023": { name: "Tata Salt 1kg",      price: 24,  icon: "🧂" },
  "8901764100023": { name: "Colgate 200g",       price: 55,  icon: "🪥" },
  "8904109412001": { name: "Fevicol 50g",        price: 35,  icon: "🗜️" },
};

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentBill = []; // { barcode, name, price, qty, icon }
let codeReader = null;
let scanCooldown = false;

// ═══════════════════════════════════════
// SCANNER — FIX: getUserMedia first
// ═══════════════════════════════════════
async function startScanner() {
  // Step 1: Explicitly request camera permission
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }
    });
    // We got permission — stop this stream, let ZXing handle it
    stream.getTracks().forEach(t => t.stop());
  } catch (permErr) {
    console.warn("Camera permission denied:", permErr);
    showCamError();
    return;
  }

  // Step 2: Start ZXing reader
  try {
    codeReader = new ZXingBrowser.BrowserMultiFormatReader();
    const devices = await codeReader.listVideoInputDevices();
    if (!devices || devices.length === 0) { showCamError(); return; }

    // Prefer back camera
    const backCam = devices.find(d =>
      /back|rear|environment/i.test(d.label)
    ) || devices[devices.length - 1];

    await codeReader.decodeFromVideoDevice(
      backCam.deviceId,
      'video',
      (result, err) => {
        if (result && !scanCooldown) {
          handleBarcode(result.getText());
          scanCooldown = true;
          setTimeout(() => { scanCooldown = false; }, 1800);
        }
      }
    );
    document.getElementById('camError').classList.remove('show');
  } catch (err) {
    console.error("ZXing error:", err);
    showCamError();
  }
}

function showCamError() {
  document.getElementById('camError').classList.add('show');
}

async function retryCamera() {
  document.getElementById('camError').classList.remove('show');
  if (codeReader) { try { codeReader.reset(); } catch(e){} }
  codeReader = null;
  await startScanner();
}

// ═══════════════════════════════════════
// BARCODE HANDLER — FIX: template literal
// ═══════════════════════════════════════
function handleBarcode(code) {
  const product = productDB[code] || {
    name: `Item (${code.slice(-6)})`,
    price: 50,
    icon: "📦"
  };

  // FIX: Increase qty if same barcode already in bill
  const existing = currentBill.find(i => i.barcode === code);
  if (existing) {
    existing.qty += 1;
  } else {
    currentBill.push({
      barcode: code,
      name: product.name,
      price: product.price,
      icon: product.icon || "📦",
      qty: 1
    });
  }

  renderBill();
  // FIX: correct template literal (was broken with \( \))
  showToast(`${product.icon || "📦"} ${product.name} — ₹${product.price}`);
}

// ═══════════════════════════════════════
// MANUAL INPUT
// ═══════════════════════════════════════
function addManual() {
  const inp = document.getElementById('manualCode');
  const code = inp.value.trim();
  if (!code) return;
  handleBarcode(code);
  inp.value = '';
  inp.focus();
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('scanToast');
  t.textContent = '✅ ' + msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════
// RENDER BILL
// ═══════════════════════════════════════
function renderBill() {
  const container = document.getElementById('itemsList');
  container.innerHTML = '';

  if (currentBill.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏪</div>
        <div class="empty-text">Abhi koi item nahi hai</div>
        <div class="empty-sub">Camera se barcode scan karo ya manually add karo</div>
      </div>`;
  } else {
    currentBill.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'item-card';
      card.innerHTML = `
        <div class="item-icon">${item.icon}</div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-barcode">${item.barcode}</div>
        </div>
        <div class="item-right">
          <div class="item-price">₹${(item.price * item.qty).toFixed(0)}</div>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
          </div>
        </div>`;
      container.appendChild(card);
    });
  }

  updateTotals();
}

function changeQty(index, delta) {
  currentBill[index].qty += delta;
  if (currentBill[index].qty <= 0) currentBill.splice(index, 1);
  renderBill();
}

function updateTotals() {
  const total     = currentBill.reduce((s, i) => s + i.price * i.qty, 0);
  const itemCount = currentBill.reduce((s, i) => s + i.qty, 0);

  document.getElementById('totalDisplay').textContent = total.toFixed(0);
  document.getElementById('grandTotal').textContent   = total.toFixed(0);
  document.getElementById('itemCount').textContent    = itemCount;
  document.getElementById('billSummary').textContent  =
    `${itemCount} item${itemCount !== 1 ? 's' : ''} · ₹${total.toFixed(2)}`;
}

// ═══════════════════════════════════════
// PAYMENT
// ═══════════════════════════════════════
function showPaymentModal() {
  const total = currentBill.reduce((s, i) => s + i.price * i.qty, 0);
  if (total === 0) { showToast("Pehle koi item add karo!"); return; }
  document.getElementById('paymentModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('paymentModal').classList.add('hidden');
}

function cashPayment() {
  closeModal();
  const total = currentBill.reduce((s, i) => s + i.price * i.qty, 0);
  showSuccess("ok", "💵 Cash Liya!", `₹${total.toFixed(2)} successfully liya gaya. Shukriya!`);
}

async function upiPayment() {
  closeModal();
  const total = currentBill.reduce((s, i) => s + i.price * i.qty, 0);

  const options = {
    key: "rzp_live_SlFpkLaE2aao9D",
    amount: total * 100,
    currency: "INR",
    name: "My Kirana Store",
    description: "Bill Payment",
    handler: function(response) {
      showSuccess("ok", "📱 UPI Payment Ho Gaya!",
        "Payment ID: " + response.razorpay_payment_id);
    },
    modal: { ondismiss: function() {} },
    theme: { color: "#F97316" }
  };

  try {
    const rzp = new Razorpay(options);
    rzp.open();
  } catch(e) {
    showSuccess("err", "UPI Error", "Razorpay load nahi hua. Network check karo.");
  }
}

function showSuccess(type, title, msg) {
  const wrap = document.getElementById('successIconWrap');
  wrap.className = `success-icon-wrap ${type === 'ok' ? 'ok' : 'err'}`;
  document.getElementById('successIcon').textContent  = type === 'ok' ? '✅' : '❌';
  document.getElementById('successTitle').textContent = title;
  document.getElementById('successMsg').textContent   = msg;
  document.getElementById('successModal').classList.remove('hidden');
}

function closeSuccessModal() {
  document.getElementById('successModal').classList.add('hidden');
  clearBill();
}

// ═══════════════════════════════════════
// CLEAR
// ═══════════════════════════════════════
function clearBill() {
  currentBill = [];
  renderBill();
  document.getElementById('billNo').textContent =
    String(Math.floor(1000 + Math.random() * 9000));
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
window.onload = () => {
  clearBill();
  startScanner();
};
</script>
</body>
</html>
